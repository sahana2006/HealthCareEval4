<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MEDBITS – Medical Records</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../css/patient/global.css">
  <link rel="stylesheet" href="../../css/components/p_sidebar.css">
  <link rel="stylesheet" href="../../css/components/p_navbar.css">
  <link rel="stylesheet" href="../../css/patient/records-profile-feedback.css">
</head>
<body>

<div id="sidebarMount"></div>

<div class="main-wrap">
  <div id="navbarMount"></div>

  <main class="content">

    <!-- Stats row -->
    <div class="stats-row">
      <div class="stat-card"><div class="stat-num" id="stat-total">0</div>   <div class="stat-label">Total Records</div></div>
      <div class="stat-card"><div class="stat-num" id="stat-consults">0</div><div class="stat-label">Consultations</div></div>
      <div class="stat-card"><div class="stat-num" id="stat-labs">0</div>    <div class="stat-label">Lab Reports</div></div>
    </div>

    <!-- Records list -->
    <div class="card">
      <div class="section-header">
        <div class="section-title">Medical Reports</div>
        <button class="btn btn-primary btn-sm" onclick="openAddRecord()">+ Add Record</button>
      </div>
      <div id="recList"></div>
    </div>

  </main>
</div>


<!-- Record card template -->
<template id="tpl-rec-card">
  <div class="rec-card">
    <div>
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
        <div class="rec-title"></div>
        <span class="badge rec-badge"></span>
      </div>
      <div class="rec-meta rec-meta-doc"></div>
      <div class="rec-meta rec-meta-date"></div>
      <div class="rec-prescription mt-8"></div>
      <div class="rec-notes"></div>
    </div>
    <div class="rec-actions">
      <button class="btn btn-primary btn-sm btn-followup">Follow-Up</button>
      <button class="btn btn-outline btn-sm btn-edit">Edit</button>
      <button class="btn btn-red     btn-sm btn-delete">Delete</button>
    </div>
  </div>
</template>

<!-- ─── MODAL TEMPLATES ─── -->

<!-- Shared record form (used for both Add and Edit) -->
<template id="tpl-recForm">
  <div class="modal-title">Record Details</div>
  <div class="form-grid">
    <div class="form-group full"><label>Title / Condition</label><input id="rf-title" placeholder="e.g. Diabetes"></div>
    <div class="form-group"><label>Type</label>
      <select id="rf-type"><option>Consultation</option><option>Lab Report</option></select>
    </div>
    <div class="form-group"><label>Date</label>        <input type="date" id="rf-date"></div>
    <div class="form-group"><label>Doctor</label>      <input id="rf-doc"   placeholder="Dr. Name"></div>
    <div class="form-group"><label>Department</label>  <input id="rf-dept"  placeholder="Cardiology"></div>
    <div class="form-group full"><label>Prescription</label><input id="rf-presc" placeholder="Medicine details"></div>
    <div class="form-group full"><label>Notes</label>  <textarea id="rf-notes" placeholder="Doctor's notes..."></textarea></div>
  </div>
  <button class="btn btn-primary btn-full mt-20 rec-submit-btn" onclick="addRecord()">Add Record</button>
</template>

<!-- Follow-up form -->
<template id="tpl-followUp">
  <div class="modal-title">Schedule Follow-Up</div>
  <p class="text-muted mb-16" id="fu-label"></p>
  <input type="hidden" id="fu-id">
  <div class="form-group mb-16"><label>Follow-Up Date</label><input type="date" id="fu-date"></div>
  <div class="form-group mb-16"><label>Notes</label><textarea id="fu-notes" placeholder="Any notes..."></textarea></div>
  <button class="btn btn-primary btn-full" onclick="bookFollowUp()">Book Follow-Up</button>
</template>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal()">
  <div class="modal-box" onclick="event.stopPropagation()">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div id="modalContent"></div>
  </div>
</div>
<div class="toast-container" id="toastContainer"></div>

<script src="../../js/patient/data.js"></script>
<script src="../../js/patient/utils.js"></script>
<script src="../../js/patient/components.js"></script>
<script src="../../js/patient/records.js"></script>
<script>
  (async () => {
    await loadDB();
    await loadComponents('records', 'Medical Records');
    updateTopbarUser();
    renderMedicalRecords();
  })();
</script>
</body>
</html>
