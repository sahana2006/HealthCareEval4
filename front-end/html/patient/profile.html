<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MEDBITS – Profile</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../css/patient/global.css">
  <link rel="stylesheet" href="../../css/components/p_sidebar.css">
  <link rel="stylesheet" href="../../css/components/p_navbar.css">
  <link rel="stylesheet" href="../../css/patient/records-profile-feedback.css">
</head>
<body>

<div id="sidebarMount"></div>

<div class="main-wrap">
  <div id="navbarMount"></div>

  <main class="content">

    <!-- Profile banner -->
    <div class="profile-banner">
      <div class="profile-banner-left">
        <div class="profile-avatar-lg" id="profileInitials"></div>
        <div>
          <h2 id="profileName"></h2>
          <p id="profileId"></p>
        </div>
      </div>
      <button class="btn btn-outline"
        style="border-color:rgba(255,255,255,.4);color:#fff;background:rgba(255,255,255,.1)"
        onclick="openEditProfile()">Edit Profile</button>
    </div>

    <!-- Personal info card -->
    <div class="card">
      <div class="section-title mb-16">Personal Information</div>
      <div class="form-grid">
        <div class="form-group"><label>First Name</label>   <input id="pf-firstName" readonly></div>
        <div class="form-group"><label>Last Name</label>    <input id="pf-lastName"  readonly></div>
        <div class="form-group"><label>Date Of Birth</label><input id="pf-dob"       readonly></div>
        <div class="form-group"><label>Gender</label>       <input id="pf-gender"    readonly></div>
        <div class="form-group"><label>Blood Group</label>  <input id="pf-blood"     readonly></div>
        <div class="form-group"><label>Phone Number</label> <input id="pf-phone"     readonly></div>
        <div class="form-group full"><label>Email ID</label><input id="pf-email"     readonly></div>
        <div class="form-group full"><label>Guardian's Name</label><input id="pf-guardian" readonly></div>
      </div>
    </div>

  </main>
</div>

<!-- Edit Profile Modal Template -->
<template id="tpl-editProfile">
  <div class="modal-title">Edit Profile</div>
  <div class="form-grid">
    <div class="form-group"><label>First Name</label><input id="ef-fn"></div>
    <div class="form-group"><label>Last Name</label> <input id="ef-ln"></div>
    <div class="form-group"><label>Date Of Birth</label><input id="ef-dob"></div>
    <div class="form-group"><label>Gender</label>
      <select id="ef-gender">
        <option>Male</option><option>Female</option><option>Other</option>
      </select>
    </div>
    <div class="form-group"><label>Blood Group</label><input id="ef-bg"></div>
    <div class="form-group"><label>Phone</label>      <input id="ef-ph"></div>
    <div class="form-group full"><label>Email</label>   <input id="ef-em"></div>
    <div class="form-group full"><label>Guardian</label><input id="ef-gn"></div>
  </div>
  <button class="btn btn-primary btn-full mt-20" onclick="saveProfile()">Save Changes</button>
</template>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal()">
  <div class="modal-box" onclick="event.stopPropagation()">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div id="modalContent"></div>
  </div>
</div>
<div class="toast-container" id="toastContainer"></div>

<script src="../../js/patient/data.js"></script>
<script src="../../js/patient/utils.js"></script>
<script src="../../js/patient/components.js"></script>
<script src="../../js/patient/profile.js"></script>
<script>
  (async () => {
    await loadDB();
    await loadComponents('profile', 'Profile');
    updateTopbarUser();
    renderProfile();
  })();
</script>
</body>
</html>
